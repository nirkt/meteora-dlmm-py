name: python_publish
 
on:
  push:
    tags:
      - "v*"
 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
 
      - name: Verify the wheel reproduces diff=0 before publishing
        run: |
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install dist/*.whl
          /tmp/verify/bin/python -m meteora_dlmm.selftest
 
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
 
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # optional: add a protection rule on this env in repo settings
    permissions:
      id-token: write          # REQUIRED for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
 
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
